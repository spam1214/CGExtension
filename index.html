<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabshare</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 32px;
        background: #f6f7fb;
        color: #1f2328;
      }
      .card {
        max-width: 720px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 28px;
      }
      p {
        margin: 0 0 12px 0;
        color: #444;
      }
      .muted {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Tabshare</h1>
      <p>Share Chrome tab groups with a simple link.</p>
      <p class="muted">Open a shared link like <code>/g/&lt;id&gt;</code> to view a group.</p>
    </div>
  </body>
</html>
