<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabshare</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #f6f7fb;
        color: #1f2328;
      }
      .card {
        max-width: 720px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 24px;
      }
      .badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
        background: #e6e9f4;
        color: #333;
        margin-left: 6px;
      }
      .list {
        margin: 16px 0 0 0;
        padding: 0;
        list-style: none;
      }
      .list li {
        padding: 8px 0;
        border-bottom: 1px solid #eee;
        word-break: break-word;
      }
      .cta-row {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button {
        padding: 10px 12px;
        border: 0;
        border-radius: 8px;
        background: #1f6feb;
        color: #fff;
        cursor: pointer;
      }
      button.secondary {
        background: #6c757d;
      }
      .status {
        margin-top: 10px;
        min-height: 20px;
      }
      .muted {
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">Loading...</h1>
      <div id="meta"></div>
      <ul class="list" id="tabList"></ul>
      <div class="cta-row">
        <button id="openGroupBtn" disabled>Open Tab Group</button>
        <button id="openAllBtn" class="secondary" disabled>Open All Tabs</button>
      </div>
      <div class="status" id="status"></div>
    </div>

    <script>
      const SUPABASE_URL = "https://lrjflmdyevwozkwdxmfb.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyamZsbWR5ZXZ3b3prd2R4bWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDA4MTgsImV4cCI6MjA4ODY3NjgxOH0.NPpXGMTvAZ-RS1cM65yMs7cKd_8fmGO8lXTTfgeV03Q";
      const EXTENSION_ID = "";

      const titleEl = document.getElementById("title");
      const metaEl = document.getElementById("meta");
      const tabListEl = document.getElementById("tabList");
      const openGroupBtn = document.getElementById("openGroupBtn");
      const openAllBtn = document.getElementById("openAllBtn");
      const statusEl = document.getElementById("status");

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "#b00020" : "#333";
      }

      function getIdFromPath() {
        const parts = window.location.pathname.split("/");
        return parts[parts.length - 1] || "";
      }

      function colorToHex(color) {
        const map = {
          grey: "#6c757d",
          blue: "#1f6feb",
          red: "#d1242f",
          yellow: "#bf8700",
          green: "#1a7f37",
          pink: "#bf3989",
          purple: "#8250df",
          cyan: "#0969da",
        };
        return map[color] || "#6c757d";
      }

      async function fetchGroup(id) {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/tab_groups?id=eq.${id}&select=*`, {
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
        });

        if (!response.ok) {
          throw new Error("Failed to fetch group.");
        }

        const data = await response.json();
        return data[0];
      }

      function renderGroup(group) {
        titleEl.textContent = group.name || "Untitled Group";
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = group.color || "grey";
        badge.style.background = colorToHex(group.color);
        badge.style.color = "#fff";
        metaEl.appendChild(badge);

        tabListEl.innerHTML = "";
        (group.tabs || []).forEach((tab) => {
          const li = document.createElement("li");
          li.textContent = tab.title ? `${tab.title} � ${tab.url}` : tab.url;
          tabListEl.appendChild(li);
        });

        openGroupBtn.disabled = false;
        openAllBtn.disabled = false;
      }

      async function openAllTabs(group) {
        (group.tabs || []).forEach((tab) => {
          window.open(tab.url, "_blank", "noopener");
        });
      }

      async function openTabGroupInExtension(group) {
        if (!EXTENSION_ID || !window.chrome || !chrome.runtime) {
          setStatus("Extension not detected. Install it to open as a group.", true);
          return;
        }

        chrome.runtime.sendMessage(EXTENSION_ID, { action: "openGroup", data: group }, (response) => {
          if (chrome.runtime.lastError) {
            setStatus("Extension not detected. Install it to open as a group.", true);
            return;
          }
          if (!response || !response.ok) {
            setStatus("Failed to open group in extension.", true);
            return;
          }
          setStatus("Opened tab group.");
        });
      }

      (async () => {
        const id = getIdFromPath();
        if (!id) {
          setStatus("Invalid link.", true);
          return;
        }

        try {
          const group = await fetchGroup(id);
          if (!group) {
            setStatus("Group not found.", true);
            return;
          }
          renderGroup(group);

          openAllBtn.addEventListener("click", () => openAllTabs(group));
          openGroupBtn.addEventListener("click", () => openTabGroupInExtension(group));
          setStatus("Ready.");
        } catch (err) {
          setStatus(String(err.message || err), true);
        }
      })();
    </script>
  </body>
</html>
